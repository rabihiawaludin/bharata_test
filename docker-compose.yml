version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bharata_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql

  nginx:
    image: nginx:alpine

    container_name: bharata_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:
    image: mysql:8.0

    container_name: bharata_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: bharata_test
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: